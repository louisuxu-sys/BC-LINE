services:
  - type: web
    name: sv94-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: LINE_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: GR_USERNAME
        sync: false
      - key: GR_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.11
